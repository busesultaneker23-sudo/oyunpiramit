function bar(){

    b+=(i<cur)?"🔓":(i===cur)?"🚪":"🔒";

  }
  return b;
}

  const ca=document.getElementById("cards-area");
  ca.innerHTML="";

    const b=document.createElement("button");

    b.onclick=()=>pick(o);
    ca.appendChild(b);
  });
}

    cur++;
    if(cur>=10){victory();return;}
    fb.style.background="#EFFFEE";
    fb.innerHTML=`<span style="font-size:18px;">🎉</span> <strong style="color:#2E7D32;">Harika! Kapı açılıyor!</strong> <span style="font-size:18px;">🎉</span>`;
    setTimeout(render,1700);
  } else {
    fb.style.background="#FFF3E0";
    fb.innerHTML=`<div style="color:#E65100;margin-bottom:5px;">😬 Yanlış kart! Tekrar dene!</div><div style="color:#6D4C00;font-weight:600;font-style:italic;">${L.hint}</div>`;
  }
}

function victory(){
  document.getElementById("progress-bar").textContent="🔓 🔓 🔓 🔓 🔓 🔓 🔓 🔓 🔓 🔓";
  document.getElementById("level-label").textContent="TÜM ODALAR AÇILDI! 🎊";
  document.getElementById("story-area").innerHTML=`<strong style="font-size:16px;color:#8B4010;">🌅 TEBRİKLER, BÜYÜK KAŞİF! 🌅</strong><br><br>Onuncu kapı gürültüyle açıldı ve seni altın ışığına boğdu! Dar koridoru geçip dışarıya fırladın. Güneş ufukta alev alev batarken, dev Sphinx yüzüne gülümsüyor 🦁 Sahara'nın sıcak rüzgarı yüzüne çarpıyor — ÖZGÜRSÜN!<br><br><strong style="color:#C07010;">✨ Firavun fısılıyor: "Matematik, tüm çağların anahtarıdır!" ✨</strong>`;
  document.getElementById("riddle-question").textContent="";
  document.getElementById("riddle-sequence").innerHTML=`<span style="font-size:46px;">🏆</span>`;
  document.getElementById("feedback-area").innerHTML="";
  document.getElementById("cards-area").innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:10px 0;"><button onclick="restart()" class="qcard" style="background:#FFF0B0;border-color:#E8B820;color:#8B5010;font-size:16px;font-weight:800;padding:16px 40px;max-width:260px;margin:0 auto;">🔄  Tekrar Oyna</button></div>`;
}

function restart(){cur=0;render();}
render();
</script>
